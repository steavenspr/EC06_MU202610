sonar.projectKey=steavenspr_testexam
sonar.organization=steavenspr

# Sources : Laravel (app) + React (src) + auth-server (Java)
sonar.sources=backend/app,frontend/src,auth-server/src/main/java

# Tests : PHPUnit + Vitest + JUnit (auth-server)
sonar.tests=backend/tests,frontend/src,auth-server/src/test/java
sonar.test.inclusions=frontend/src/**/*.test.js,frontend/src/**/*.test.jsx,auth-server/src/test/**/*.java

# Couverture : Clover (PHP) + LCOV (JS) + JaCoCo (Java)
sonar.php.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.coverage.jacoco.xmlReportPaths=auth-server/target/site/jacoco/jacoco.xml

# Java (auth-server)
sonar.java.source=17
sonar.java.binaries=auth-server/target/classes
sonar.java.test.binaries=auth-server/target/test-classes
# Dépendances Maven (copiées en CI avant Sonar) — évite l'avertissement sonar.java.libraries vide
sonar.java.libraries=auth-server/target/sonar-libs

# Exclusions analyse (vendor, builds, caches)
sonar.exclusions=**/vendor/**,**/node_modules/**,**/dist/**,**/build/**,**/storage/**,**/bootstrap/cache/**,**/*.blade.php,**/public/**,**/coverage/**,auth-server/target/**

# Exclusions couverture (hors périmètre métier ou fichiers purement techniques)
sonar.coverage.exclusions=backend/app/Console/**,backend/app/Exceptions/**,backend/app/Providers/**,backend/database/migrations/**,backend/database/seeders/**,frontend/src/main.jsx,frontend/src/App.jsx,frontend/src/pages/**,frontend/vite.config.js,frontend/src/test/**,frontend/src/**/*.test.js,frontend/src/**/*.test.jsx

sonar.sourceEncoding=UTF-8
