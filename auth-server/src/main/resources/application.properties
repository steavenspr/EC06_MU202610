server.port=8080

# Docker : définir SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db_tp3}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.file.name=logs/auth.log
logging.level.com.example.auth=INFO

# JWT (HS256) - injecte depuis l'environnement (OS / docker-compose / GitHub Secrets)
# Doit faire au moins 32 caracteres.
jwt.secret=${JWT_SECRET:}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:15}
jwt.issuer=${JWT_ISSUER:ec06-auth-server}
