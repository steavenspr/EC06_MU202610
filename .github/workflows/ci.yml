name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — CI : install, lint, test, build
  # ─────────────────────────────────────────
  ci:
    name: CI — Install · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour SonarCloud

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, zip, bcmath, gd, mongodb-2.2.0

      # 3. Install dépendances Laravel (composer install)
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/logs
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          composer install --optimize-autoloader --no-interaction --ignore-platform-req=ext-mongodb

      # 4. Lint backend (Laravel Pint — analyse statique)
      - name: Lint backend
        working-directory: ./backend
        run: ./vendor/bin/pint --test

      # 5. Tests Laravel + rapport Clover (Sonar)
      - name: Run backend tests with coverage
        working-directory: ./backend
        run: php artisan test --env=testing --coverage-clover=coverage.xml

      # 6. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 7. Install dépendances frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # 8. Lint frontend
      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || true

      # 9. Tests frontend + LCOV (Sonar)
      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      # 10. Spring Boot — mvn install (compile, tests, JaCoCo, package)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: auth-server/pom.xml

      - name: Install and test auth-server (Maven install)
        working-directory: ./auth-server
        run: mvn -B install

      # Dépendances Java pour Sonar (classpath)
      - name: Copy Maven dependencies for Sonar
        working-directory: ./auth-server
        run: mvn -B dependency:copy-dependencies -DoutputDirectory=target/sonar-libs

      # 11. SonarCloud — analyse CI uniquement (désactiver l’Automatic Analysis sur sonarcloud.io)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 12. Build images Docker (tag SHA) — Laravel + auth-server (+ frontend)
      - name: Build Docker images
        run: |
          docker build -t skillhub-api:${{ github.sha }} ./backend
          docker build -t skillhub-auth-server:${{ github.sha }} ./auth-server
          docker build -t skillhub-frontend:${{ github.sha }} ./frontend \
            --build-arg VITE_API_BASE_URL=http://localhost:8000 \
            --build-arg VITE_AUTH_API_BASE_URL=http://localhost:8080

  # ─────────────────────────────────────────
  # JOB 2 — CD : push images après merge sur main
  # Credentials registry : REGISTRY_USER + REGISTRY_TOKEN (secrets GitHub)
  # ─────────────────────────────────────────
  cd:
    name: CD — Push to container registry
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_USER }}/skillhub-api:${{ github.sha }}
            ${{ secrets.REGISTRY_USER }}/skillhub-api:latest

      - name: Build and push Auth-server image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-server
          push: true
          tags: |
            ${{ secrets.REGISTRY_USER }}/skillhub-auth-server:${{ github.sha }}
            ${{ secrets.REGISTRY_USER }}/skillhub-auth-server:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
            VITE_AUTH_API_BASE_URL=http://localhost:8080
          tags: |
            ${{ secrets.REGISTRY_USER }}/skillhub-frontend:${{ github.sha }}
            ${{ secrets.REGISTRY_USER }}/skillhub-frontend:latest
